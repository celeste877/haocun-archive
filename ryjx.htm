            z-index: 200;
            border: 1px solid rgba(155,44,29,0.1);
            margin-top: 0.5rem;
        }

        .nav-links li:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
        }

        .dropdown-menu a {
            display: block;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--charcoal);
            text-align: center;

                transform: none;
                justify-content: center;
                margin-top: 0.8rem;
                flex-wrap: wrap;
                gap: 1rem;
            }
            .dropdown-menu {
                left: 0;
                transform: none;
                min-width: 120px;
            }

            width: 100%;
            min-height: 420px;
            margin: 2rem 0 1rem;
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 统一图片尺寸 - 缩小版 */
        .overlap-item {
            position: absolute;
            transition: none;
            opacity: 0.3;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 260px;
            height: 390px;
            max-width: 70vw;
            max-height: calc(70vw * 1.5);
        }
        .overlap-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            display: block;
        }

        .overlap-item.active {
            opacity: 1;
            z-index: 10;
            box-shadow: 0 0 0 3px var(--gold), 0 15px 30px rgba(0,0,0,0.3);

        function highlightItem(index) {
            overlapItems.forEach((item, i) => {
                if (i === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % overlapItems.length;
            highlightItem(currentIndex);
        }

        function startAutoPlay() {
            if (autoTimer) clearInterval(autoTimer);
            autoTimer = setInterval(() => {
                nextSlide();
            }, 1500);
        }

        function stopAutoPlay() {
            if (autoTimer) {
                clearInterval(autoTimer);

            }

            { date: "2021.8.1", name: "第30届华鼎奖-中国电影最佳新锐演员奖", work: "《送你一朵小红花》", result: "获奖" },
            { date: "2021.6.1", name: "2021微博电影之夜-年度最受关注演员", work: "", result: "获奖" },
            { date: "2021.6.1", name: "第18届电影频道传媒大奖-最受传媒关注新人女演员", work: "《送你一朵小红花》", result: "获奖" },
            { date: "2021.3.1", name: "第12届青年电影手册年度盛典-年度新演员", work: "《一秒钟》", result: "获奖" },
            { date: "2021.2.1", name: "2020微博之夜-微博年度期待演员", work: "", result: "获奖" },
            { date: "2021.2.1", name: "2020中国银幕风云榜-年度新人演员", work: "《一秒钟》《送你一朵小红花》", result: "获奖" },
            { date: "2021.1.1", name: "2020百度娱乐人物-年度最佳电影新人", work: "", result: "获奖" },
            { date: "2021.1.1", name: "2020腾讯娱乐年度盛典-年度电影新演员", work: "《一秒钟》《送你一朵小红花》", result: "获奖" },
            { date: "2021.1.1", name: "第1届金榆花奖-最佳新锐影人", work: "《一秒钟》《送你一朵小红花》", result: "获奖" },
            { date: "2020.12.1", name: "2020尚流Tatler盛典-尚流新星奖", work: "", result: "获奖" },
            { date: "2020.12.1", name: "2020年度电影频道M榜-年度最具潜力演员", work: "", result: "获奖" },
            { date: "2020.12.1", name: "第1届Feng向标2020年度榜单-电影类-年度女演员", work: "《一秒钟》", result: "提名" }
        ];

        const groups = {};
        awardsData.forEach(item => {
            const year = item.date.split('.')[0];
            if (!groups[year]) groups[year] = [];
            groups[year].push(item);
        });
        const sortedYears = Object.keys(groups).sort((a,b) => b - a);

        let win = 0, nom = 0;
        awardsData.forEach(item => {
            if (item.result === "获奖") win++;
            else if (item.result === "提名") nom++;
        });
        document.getElementById('winCount').innerText = win;
        document.getElementById('nomCount').innerText = nom;
        document.getElementById('totalCount').innerText = awardsData.length;

        const navList = document.getElementById('yearNav').querySelector('ul');
        sortedYears.forEach(year => {
            const li = document.createElement('li');
            li.textContent = year;
            li.setAttribute('data-year', year);
            li.addEventListener('click', () => {
                document.querySelector(`.award-year-group[data-year="${year}"]`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelectorAll('.year-nav li').forEach(l => l.classList.remove('active'));
                li.classList.add('active');
            });
            navList.appendChild(li);
        });
        if (navList.firstChild) navList.firstChild.classList.add('active');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const year = entry.target.getAttribute('data-year');
                    document.querySelectorAll('.year-nav li').forEach(li => {
                        li.classList.remove('active');
                        if (li.getAttribute('data-year') === year) li.classList.add('active');
                    });
                }
            });
        }, { threshold: 0.5, rootMargin: '-80px 0px 0px 0px' });

        const streamContainer = document.getElementById('awardsStream');
        sortedYears.forEach(year => {
            const yearGroup = document.createElement('div');
            yearGroup.className = 'award-year-group';
            yearGroup.setAttribute('data-year', year);
            yearGroup.innerHTML = `<div class="year-title">${year}</div><div class="award-cards"></div>`;
            const cardsContainer = yearGroup.querySelector('.award-cards');
            groups[year].forEach(item => {
                const resultClass = item.result === '获奖' ? 'result-win-new' : 'result-nom-new';
                const workHtml = item.work ? `<span class="award-work-new">${item.work}</span>` : '';
                const dateParts = item.date.split('.');
                const dateDisplay = dateParts.slice(1).join('.');
                const card = document.createElement('div');
                card.className = 'award-card-new';
                card.innerHTML = `
                    <div class="award-icon">${item.result === '获奖' ? '🏆' : '📋'}</div>
                    <div class="award-info">
                        <div class="award-name-new">${item.name}</div>
                        <div class="award-meta">
                            ${workHtml}
                            <span class="award-result-new ${resultClass}">${item.result}</span>
                        </div>
                    </div>
                    <div class="award-date-right">${dateDisplay}</div>
                `;
                cardsContainer.appendChild(card);
            });
            streamContainer.appendChild(yearGroup);
            observer.observe(yearGroup);
        });
    </script>
</body>
</html>
