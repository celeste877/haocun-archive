    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --crimson: #9b2c1d;
            --crimson-dark: #7a2417;
            --crimson-light: #fef5f3;
            --gold: #c9a96e;
            --gold-light: #faf3e0;
            --charcoal: #2c2c2c;
            --gray-light: #f8f8f8;
            --gray-mid: #6c6c6c;
            --white: #ffffff;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--gray-light);
            color: var(--charcoal);
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 导航栏 */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 0;
            border-bottom: 2px solid var(--crimson);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--crimson);
            text-decoration: none;
            font-family: 'Noto Serif SC', '宋体', serif;
        }

        .logo span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 700;
            color: var(--charcoal);
            transition: var(--transition);
            position: relative;
            font-size: 0.95rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--crimson);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--crimson);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                position: static;
            }
            .nav-links {
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 0.8rem;
                flex-wrap: wrap;
                gap: 1rem;
            }
        }

        /* 页面标题 */
        .page-header {
            padding: 3rem 0 1rem;
            text-align: center;
        }
        .page-header h1 {
            font-family: 'Noto Serif SC', '宋体', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--crimson);
            position: relative;
            display: inline-block;
        }
        .page-header h1:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }
        .page-header p {
            margin-top: 1rem;
            color: black;
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 2rem;
            background: var(--white);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .filter-btn {
            background: var(--gray-light);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            color: var(--charcoal);
        }
        .filter-btn.active {
            background: var(--crimson);
            color: white;
        }
        .filter-btn:hover:not(.active) {
            background: var(--gold-light);
            color: var(--crimson);
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .search-box input {
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 0.85rem;
            width: 200px;
        }
        .search-box input:focus {
            border-color: var(--gold);
        }
        .search-box button {
            background: var(--crimson);
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* 作品网格 */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .movie-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(155,44,29,0.08);
        }
        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
            border-color: var(--gold);
        }
        .movie-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-info {
            padding: 1rem;
        }
        .movie-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: var(--crimson);
        }
        .movie-year {
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }
        .movie-rating {
            font-size: 0.85rem;
            color: var(--gray-mid);
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }
        .movie-rating span {
            color: var(--gold);
        }

        /* 暂无数据提示 */
        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--gray-mid);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--white);
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--gray-mid);
        }
        .modal-close:hover {
            color: var(--crimson);
        }
        .modal h2 {
            font-family: 'Noto Serif SC', serif;
            color: var(--crimson);
            margin-bottom: 0.5rem;
        }
        .modal-meta {
            margin-bottom: 1rem;
            color: var(--gold);
        }
        .modal-detail {
            margin-bottom: 1rem;
        }
        .modal-detail strong {
            color: var(--crimson);
        }
        .watch-btn {
            display: inline-block;
            background: var(--crimson);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 0.5rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .watch-btn:hover {
            background: var(--gold);
            color: var(--charcoal);
        }
        .watch-btn.disabled {
            background: #ccc;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 相关链接区域 */
        .links-section {
            padding: 2rem 0 4rem;
            background: var(--white);
            text-align: center;
            margin-top: 2rem;

        .links-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--crimson);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        .links-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }

            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .link-card {
            background: var(--gray-light);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--charcoal);
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .link-card:hover {
            background: var(--white);
            border-color: var(--crimson);
            transform: translateY(-2px);
        }
        .link-card .icon {
            font-size: 1.2rem;
        }
        .link-card span {
            font-weight: 500;
            font-size: 0.9rem;
        }

        @media (max-width: 1024px) {
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 640px) {
            .movies-grid {
                grid-template-columns: 1fr;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
                border-radius: 24px;
            }
            .search-box {
                justify-content: center;
            }
        }

        footer {
            background: var(--charcoal);
            color: #aaa;
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
        }
    </style>
</head>

        function getPosterHtml(movie) {
            if (movie.poster) {
                return `<img src="${movie.poster}" alt="${movie.title}">`;
            } else {
                return `<div style="width:100%;height:100%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#999;">🎬</div>`;
            }
        }

        let currentFilter = "all";
        let currentKeyword = "";

        function renderMovies() {
            const grid = document.getElementById("moviesGrid");
            let filtered = moviesData.filter(movie => {
                if (currentFilter !== "all" && movie.year != currentFilter) return false;
                if (currentKeyword) {
                    const keyword = currentKeyword.toLowerCase();
                    return movie.title.toLowerCase().includes(keyword) || 
                           movie.role.toLowerCase().includes(keyword) ||
                           (movie.titleEn && movie.titleEn.toLowerCase().includes(keyword));
                }
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-data">没有找到相关作品</div>`;
                return;
            }

            grid.innerHTML = filtered.map(movie => {
                const yearDisplay = movie.yearDisplay || movie.year;
                const ratingDisplay = movie.rating ? `${movie.rating} 分` : "待上映";
                return `
                    <div class="movie-card" data-id="${moviesData.indexOf(movie)}">
                        <div class="movie-poster">
                            ${getPosterHtml(movie)}
                        </div>
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-year">${yearDisplay}</div>
                            <div class="movie-rating">
                                ${movie.rating ? `<span>⭐</span> ${ratingDisplay}` : '<span>📅</span> 待上映'}
                            </div>
                        </div>
                    </div>
                `;
            }).join("");

            document.querySelectorAll(".movie-card").forEach(card => {
                card.addEventListener("click", (e) => {
                    const id = parseInt(card.dataset.id);
                    showModal(id);
                });
            });
        }

        function showModal(index) {
            const movie = moviesData[index];
            if (!movie) return;
            const yearDisplay = movie.yearDisplay || movie.year;
            const ratingDisplay = movie.rating ? `${movie.rating} 分` : "待上映";
            const watchButton = movie.watchUrl ? 
                `<a href="${movie.watchUrl}" target="_blank" rel="noopener noreferrer" class="watch-btn">🎬 在线观看</a>` : 
                `<span class="watch-btn disabled">📅 暂无资源</span>`;
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `
                <h2>${movie.title} <span style="font-size:1rem; color:var(--gold);">${movie.titleEn ? movie.titleEn : ""}</span></h2>
                <div class="modal-meta">${yearDisplay} · 饰演 ${movie.role}</div>
                <div class="modal-detail"><strong>导演：</strong> ${movie.director}</div>
                <div class="modal-detail"><strong>合作演员：</strong> ${movie.coStars}</div>
                <div class="modal-detail"><strong>剧情简介：</strong> ${movie.plot}</div>
                <div class="modal-detail"><strong>豆瓣评分：</strong> ${ratingDisplay}</div>
                <div>${watchButton}</div>
            `;
            document.getElementById("modal").classList.add("active");
        }

        document.querySelector(".modal-close").addEventListener("click", () => {
            document.getElementById("modal").classList.remove("active");
        });
        document.getElementById("modal").addEventListener("click", (e) => {
            if (e.target === document.getElementById("modal")) {
                document.getElementById("modal").classList.remove("active");
            }
        });

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.year;
                renderMovies();
            });
        });

        function performSearch() {
            currentKeyword = document.getElementById("searchInput").value.trim();
            renderMovies();
        }
        document.getElementById("searchBtn").addEventListener("click", performSearch);
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") performSearch();
        });

        renderMovies();
    </script>
</body>
</html>
