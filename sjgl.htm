<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数据概览 | 刘浩存电影数字档案馆</title>
    <link rel="icon" type="image/x-icon" href="22.jpg">
    <meta name="description" content="刘浩存电影数据概览——评分分布、获奖趋势、合作统计。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --crimson: #9b2c1d;
            --crimson-dark: #7a2417;
            --crimson-light: #fef5f3;
            --gold: #c9a96e;
            --gold-light: #faf3e0;
            --charcoal: #2c2c2c;
            --gray-light: #f8f8f8;
            --white: #ffffff;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--gray-light);
            color: #1a1a1a; /* 黑色 */
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ========= 导航栏（无数据概览独立项） ========= */
        .page-header {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--crimson);
        }

        .navbar {
            padding: 1rem 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--crimson);
            text-decoration: none;
            font-family: 'Noto Serif SC', '宋体', serif;
        }

        .logo span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links li {
            position: relative;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 700;
            color: var(--charcoal);
            transition: var(--transition);
            position: relative;
            font-size: 0.95rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--crimson);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--crimson);
            border-radius: 2px;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            box-shadow: var(--shadow-md);
            border-radius: 12px;
            padding: 0.5rem 0;
            min-width: 140px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 200;
            border: 1px solid rgba(155,44,29,0.1);
            margin-top: 0.5rem;
        }

        .nav-links li:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
        }

        .dropdown-menu a {
            display: block;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--charcoal);
            text-align: center;
            white-space: nowrap;
        }

        .dropdown-menu a:hover {
            background: var(--gold-light);
            color: var(--crimson);
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                position: static;
            }
            .nav-links {
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 0.8rem;
                flex-wrap: wrap;
                gap: 1rem;
            }
            .dropdown-menu {
                left: 0;
                transform: none;
                min-width: 120px;
            }
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            padding: 3rem 0 1rem;
        }
        .page-title h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--crimson);
            position: relative;
            display: inline-block;
        }
        .page-title h1:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }
        .page-title p {
            margin-top: 1rem;
            color: #1a1a1a; /* 黑色 */
        }

        /* 图表卡片 */
        .chart-card {
            background: var(--white);
            border-radius: 28px;
            padding: 1.5rem;
            margin: 2rem 0;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(155,44,29,0.08);
            transition: var(--transition);
        }
        .chart-card:hover {
            box-shadow: var(--shadow-md);
        }
        .chart-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--crimson);
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 4px solid var(--gold);
        }
        .chart-container {
            width: 100%;
            height: 400px;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 1rem 0;
        }
        @media (max-width: 900px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }

        /* 相关链接 */
        .links-section {
            padding: 2rem 0 4rem;
            background: var(--white);
            text-align: center;
            margin-top: 2rem;
        }
        .links-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--crimson);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        .links-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }
        .links-grid {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .link-card {
            background: var(--gray-light);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid transparent;
            color: #1a1a1a;
        }
        .link-card:hover {
            background: var(--white);
            border-color: var(--crimson);
            transform: translateY(-2px);
        }
        .link-card .icon {
            font-size: 1.2rem;
        }
        .link-card span {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a1a1a;
        }

        footer {
            background: var(--charcoal);
            color: #aaa;
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="container">
            <div class="navbar">
                <div class="nav-container">
                    <a href="sy.htm" class="logo">刘浩存<span>·电影数字档案馆</span></a>
                    <ul class="nav-links">
                        <li><a href="sy.htm">首页</a></li>
                        <li><a href="rwjj.htm">人物档案</a></li>
                        <li><a href="zpk.htm">作品库</a></li>
                        <li><a href="ryjx.htm">荣誉奖项</a></li>
                        <li><a href="yxdc.htm">影像典藏</a></li>
                        <li><a href="xssy.htm">学术视野</a></li>
                        <li>
                            <a href="#">更多 ▾</a>
                            <div class="dropdown-menu">
                                <a href="jsxz.htm">角色小传</a>
                                <a href="gywm.htm">关于我们</a>
                                <a href="yyjs.htm">语义检索</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-title">
                <h1>数据概览</h1>
                <p>电影评分分布 · 获奖趋势 · 合作统计</p>
            </div>

            <!-- 评分分布柱状图 -->
            <div class="chart-card">
                <div class="chart-title">电影评分分布</div>
                <div id="ratingChart" class="chart-container"></div>
            </div>

            <!-- 两列布局：获奖趋势 + 合作演员Top10 -->
            <div class="two-columns">
                <div class="chart-card">
                    <div class="chart-title">各年度获奖数量</div>
                    <div id="awardTrendChart" class="chart-container" style="height: 350px;"></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">合作演员次数 TOP10</div>
                    <div id="actorChart" class="chart-container" style="height: 350px;"></div>
                </div>
            </div>

            <!-- 导演合作次数饼图 -->
            <div class="chart-card">
                <div class="chart-title">导演合作次数占比</div>
                <div id="directorChart" class="chart-container" style="height: 380px;"></div>
            </div>
        </div>

        <!-- 相关链接 -->
        <div class="links-section">
            <div class="container">
                <div class="links-title">相关链接</div>
                <div class="links-grid">
                    <a href="https://baike.baidu.com/item/%E5%88%98%E6%B5%A9%E5%AD%98/23284525" target="_blank" rel="noopener noreferrer" class="link-card">
                        <span class="icon">📖</span>
                        <span>百度百科</span>
                    </a>
                    <a href="https://weibo.com/u/3932588380" target="_blank" rel="noopener noreferrer" class="link-card">
                        <span class="icon">🐦</span>
                        <span>新浪微博</span>
                    </a>
                    <a href="https://xhslink.com/m/71nBbC0T9Kp" target="_blank" rel="noopener noreferrer" class="link-card">
                        <span class="icon">📕</span>
                        <span>小红书</span>
                    </a>
                    <a href="https://v.douyin.com/qCxQVsclogI/" target="_blank" rel="noopener noreferrer" class="link-card">
                        <span class="icon">🎵</span>
                        <span>抖音</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 刘浩存电影数字档案馆 · 基于语义网技术的知识化电影档案平台 | 开放访问 · 学术交流</p>
        <p style="margin-top: 0.5rem;">数据基于已上映电影及公开荣誉统计，图表使用 ECharts 动态生成。</p>
    </footer>

    <script>
        // ==================== 数据定义 ====================
        const moviesData = [
            { title: "一秒钟", year: 2020, director: "张艺谋", rating: 7.7 },
            { title: "送你一朵小红花", year: 2020, director: "韩延", rating: 7.2 },
            { title: "悬崖之上", year: 2021, director: "张艺谋", rating: 7.4 },
            { title: "四海", year: 2022, director: "韩寒", rating: 5.6 },
            { title: "龙马精神", year: 2023, director: "杨子", rating: 5.8 },
            { title: "念念相忘", year: 2023, director: "刘雨霖", rating: 6.9 },
            { title: "灿烂的她", year: 2024, director: "徐伟", rating: 5.9 }
        ];

        const actorsCount = [
            { name: "张译", count: 3 },
            { name: "余皑磊", count: 3 },
            { name: "易烊千玺", count: 1 },
            { name: "朱媛媛", count: 1 },
            { name: "高亚麟", count: 2 },
            { name: "夏雨", count: 1 },
            { name: "岳云鹏", count: 1 },
            { name: "于和伟", count: 1 },
            { name: "秦海璐", count: 1 },
            { name: "朱亚文", count: 1 },
            { name: "倪大红", count: 1 },
            { name: "李乃文", count: 1 }
        ];
        const topActors = actorsCount.sort((a,b)=>b.count-a.count).slice(0,10);

        const directorCount = {};
        moviesData.forEach(m => {
            directorCount[m.director] = (directorCount[m.director] || 0) + 1;
        });
        const directorData = Object.entries(directorCount).map(([name, value]) => ({ name, value }));

        const awardsByYear = [
            { year: "2020", win: 8 },
            { year: "2021", win: 12 },
            { year: "2022", win: 5 },
            { year: "2023", win: 6 },
            { year: "2024", win: 4 },
            { year: "2025", win: 5 }
        ];

        const ratingChart = echarts.init(document.getElementById('ratingChart'));
        ratingChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '8%', right: '5%', top: '10%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', data: moviesData.map(m => m.title), axisLabel: { rotate: 30, fontWeight: 500 } },
            yAxis: { type: 'value', name: '豆瓣评分', min: 0, max: 10, axisLabel: { formatter: '{value} 分' } },
            series: [{
                name: '评分', type: 'bar', data: moviesData.map(m => m.rating),
                itemStyle: { borderRadius: [8,8,0,0], color: '#c9a96e' },
                label: { show: true, position: 'top', formatter: '{c} 分' }
            }]
        });

        const awardChart = echarts.init(document.getElementById('awardTrendChart'));
        awardChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: awardsByYear.map(y => y.year), name: '年份' },
            yAxis: { type: 'value', name: '获奖数量' },
            series: [{
                name: '获奖数量', type: 'line', smooth: true, data: awardsByYear.map(y => y.win),
                lineStyle: { color: '#9b2c1d', width: 3 }, symbol: 'circle', symbolSize: 8,
                areaStyle: { opacity: 0.1, color: '#c9a96e' }
            }]
        });

        const actorChart = echarts.init(document.getElementById('actorChart'));
        actorChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '15%', containLabel: true },
            xAxis: { type: 'value', name: '合作次数' },
            yAxis: { type: 'category', data: topActors.map(a => a.name), axisLabel: { fontWeight: 500 } },
            series: [{
                name: '合作次数', type: 'bar', data: topActors.map(a => a.count),
                itemStyle: { borderRadius: [0,8,8,0], color: '#c9a96e' },
                label: { show: true, position: 'right' }
            }]
        });

        const directorChart = echarts.init(document.getElementById('directorChart'));
        directorChart.setOption({
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'left', data: directorData.map(d => d.name) },
            series: [{
                type: 'pie', radius: '55%', center: ['50%', '50%'],
                data: directorData,
                emphasis: { scale: true },
                label: { show: true, formatter: '{b}: {d}%' },
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 }
            }]
        });

        window.addEventListener('resize', () => {
            ratingChart.resize();
            awardChart.resize();
            actorChart.resize();
            directorChart.resize();
        });
    </script>
</body>
</html>
